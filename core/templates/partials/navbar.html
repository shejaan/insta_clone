{% load static %}
<!-- ================================================================
   partials/navbar.html
   Requires: unread_notifications_count, follow_requests, notifications
   ================================================================ -->
<nav>
  <a href="{% url 'home' %}" class="logo">Socaily</a>
  <div class="nicons">

    <a href="{% url 'home' %}" class="nibtn" title="Home">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </a>

    <a href="{% url 'messages' %}" class="nibtn" title="Messages" style="position:relative">
      <div class="ndot" id="msgDot" style="{% if unread_messages_count and unread_messages_count > 0 %}display:block{% else %}display:none{% endif %}"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </a>

    <button class="nibtn" title="Create post" onclick="openCreatePost()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
    </button>

    <a href="{% url 'search' %}" class="nibtn" title="Search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </a>

    {# ── Notifications Bell ── #}
    {% include "partials/notifications_dropdown.html" %}

    {# ── Avatar ── #}
    <a href="{% url 'profile' request.user.username %}" class="navat">
      {% if request.user.profile and request.user.profile.profile_image %}
        <img src="{{ request.user.profile.profile_image.url }}" alt="{{ request.user.username }}">
      {% else %}
        <div class="navat-placeholder"></div>
      {% endif %}
    </a>

  </div>
</nav>
