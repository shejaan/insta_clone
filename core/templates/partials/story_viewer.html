<!-- ================================================================
   partials/story_viewer.html
   No view-level variables — populated by JS openStoryViewer()
   ================================================================ -->
<div id="storyViewerOverlay" onclick="if(event.target===this)closeStoryViewer()"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:700;align-items:center;justify-content:center">
  <button onclick="closeStoryViewer()"
          style="position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer">&#x2715;</button>
  <div style="max-width:380px;width:100%;padding:16px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <div style="width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid #fff;flex-shrink:0">
        <img id="svAvatarImg" style="width:100%;height:100%;object-fit:cover" alt="">
      </div>
      <span id="svUsername" style="color:#fff;font-weight:700;font-size:14px"></span>
      <span id="svTime" style="color:rgba(255,255,255,.7);font-size:12px;margin-left:auto"></span>
    </div>
    {# Progress bar #}
    <div style="height:3px;background:rgba(255,255,255,.3);border-radius:2px;margin-bottom:10px">
      <div id="svProgress" style="height:100%;background:#fff;border-radius:2px;width:0%"></div>
    </div>
    <img id="svImage" alt="story"
         style="width:100%;border-radius:12px;max-height:70vh;object-fit:contain">
    <div id="svCaption" style="color:#fff;font-size:14px;margin-top:10px;text-align:center"></div>
    <div id="svOwnerControls" style="display:none; margin-top:20px; flex-direction:column; align-items:center; justify-content:center; gap:12px;">
        <div style="display:flex; align-items:center; gap:20px;">
            <div style="color:#fff; font-size:14px; font-weight:bold;"><span id="svViewCount">0</span> Views</div>
            <button onclick="deleteCurrentStory()" style="background:none; border:1px solid #ed4956; color:#ed4956; padding:6px 16px; border-radius:16px; cursor:pointer; font-weight:bold; font-size:13px;">Delete Story</button>
        </div>
        <div id="svViewersList" style="max-height:150px; overflow-y:auto; width:100%; display:flex; flex-direction:column; gap:8px; margin-top:8px; scrollbar-width:none;">
            <!-- Viewers injected here by JS -->
        </div>
    </div>
  </div>
</div>
