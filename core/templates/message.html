{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram • Messages</title>
  <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --grad: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      --blue: #0095f6;
      --border: #dbdbdb;
      --gray: #8e8e8e;
      --dark: #262626;
      --bg: #fafafa;
      --wh: #fff;
      --nav: 60px
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--dark);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column
    }

    a {
      text-decoration: none;
      color: inherit
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit
    }

    input,
    textarea {
      font-family: inherit
    }

    /* NAV */
    nav {
      height: var(--nav);
      flex-shrink: 0;
      background: var(--wh);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100
    }

    .logo {
      font-family: 'Grand Hotel', cursive;
      font-size: 28px;
      color: var(--dark)
    }

    .nicons {
      display: flex;
      align-items: center;
      gap: 20px
    }

    .nibtn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      color: var(--dark);
      transition: opacity .15s
    }

    .nibtn:hover {
      opacity: .6
    }

    .nibtn svg {
      width: 24px;
      height: 24px
    }

    .navat {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: border-color .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px
    }

    .navat:hover {
      border-color: var(--dark)
    }

    .navat img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .navat-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #a8edea, #fed6e3)
    }

    /* LAYOUT */
    .shell {
      flex: 1;
      display: flex;
      overflow: hidden;
      max-width: 935px;
      width: 100%;
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border)
    }

    /* INBOX */
    .inbox {
      width: 350px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--wh);
      overflow: hidden
    }

    .inbox-header {
      padding: 20px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0
    }

    .inbox-title {
      font-size: 16px;
      font-weight: 800
    }

    .icon-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--dark);
      transition: opacity .15s
    }

    .icon-btn:hover {
      opacity: .5
    }

    .icon-btn svg {
      width: 24px;
      height: 24px
    }

    .inbox-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      padding: 0 16px
    }

    .tab-btn {
      flex: 1;
      padding: 12px 0;
      font-size: 14px;
      font-weight: 700;
      color: var(--gray);
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
      margin-bottom: -1px
    }

    .tab-btn.active {
      color: var(--dark);
      border-bottom-color: var(--dark)
    }

    .tab-btn:hover {
      color: var(--dark)
    }

    .inbox-search {
      padding: 10px 16px;
      flex-shrink: 0
    }

    .isearch {
      display: flex;
      align-items: center;
      background: #efefef;
      border-radius: 8px;
      padding: 7px 12px;
      gap: 8px
    }

    .isearch input {
      border: none;
      background: none;
      outline: none;
      font-size: 14px;
      color: var(--dark);
      width: 100%
    }

    .isearch input::placeholder {
      color: var(--gray)
    }

    .convo-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #dbdbdb transparent
    }

    .convo-list::-webkit-scrollbar {
      width: 4px
    }

    .convo-list::-webkit-scrollbar-thumb {
      background: #dbdbdb;
      border-radius: 2px
    }

    .convo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background .12s
    }

    .convo-item:hover {
      background: #fafafa
    }

    .convo-item.active {
      background: #f0f0f0
    }

    .convo-av {
      position: relative;
      flex-shrink: 0
    }

    .convo-av-img {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      border: 1px solid #efefef;
      overflow: hidden;
      background: linear-gradient(135deg, #a8edea, #fed6e3)
    }

    .convo-av-img img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .convo-body {
      flex: 1;
      min-width: 0
    }

    .convo-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px
    }

    .convo-name {
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .convo-time {
      font-size: 12px;
      color: var(--gray);
      flex-shrink: 0;
      margin-left: 8px
    }

    .convo-preview {
      font-size: 13px;
      color: var(--gray);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .convo-preview.bold {
      color: var(--dark);
      font-weight: 700
    }

    .unread-badge {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--dark);
      flex-shrink: 0;
      margin-left: 8px
    }

    /* CHAT PANEL */
    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--wh);
      overflow: hidden
    }

    .chat-header {
      height: 60px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px
    }

    .chat-av {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      border: 1px solid #efefef;
      cursor: pointer;
      transition: opacity .15s;
      overflow: hidden;
      background: linear-gradient(135deg, #a8edea, #fed6e3)
    }

    .chat-av img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .chat-av:hover {
      opacity: .8
    }

    .chat-user-info {
      flex: 1;
      cursor: pointer
    }

    .chat-username {
      font-size: 14px;
      font-weight: 700
    }

    .chat-status {
      font-size: 12px;
      color: var(--gray)
    }

    .chat-header-actions {
      display: flex;
      gap: 16px
    }

    .chat-hbtn {
      color: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .15s
    }

    .chat-hbtn:hover {
      opacity: .5
    }

    .chat-hbtn svg {
      width: 24px;
      height: 24px
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scrollbar-width: thin;
      scrollbar-color: #dbdbdb transparent
    }

    .messages-area::-webkit-scrollbar {
      width: 4px
    }

    .messages-area::-webkit-scrollbar-thumb {
      background: #dbdbdb;
      border-radius: 2px
    }

    .msg-date-sep {
      text-align: center;
      font-size: 12px;
      color: var(--gray);
      margin: 10px 0 4px;
      font-weight: 600
    }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px
    }

    .msg-row.out {
      flex-direction: row-reverse
    }

    .msg-row.in .msg-av {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      border: 1px solid #efefef;
      overflow: hidden;
      background: linear-gradient(135deg, #a8edea, #fed6e3)
    }

    .msg-row.in .msg-av img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .msg-row.out .msg-av {
      display: none
    }

    .bubble {
      max-width: 65%;
      padding: 10px 14px;
      border-radius: 22px;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word
    }

    .msg-row.in .bubble {
      background: #efefef;
      color: var(--dark);
      border-bottom-left-radius: 4px
    }

    .msg-row.out .bubble {
      background: linear-gradient(135deg, #0095f6, #1877f2);
      color: #fff;
      border-bottom-right-radius: 4px
    }

    .bubble.emoji-only {
      background: none !important;
      font-size: 36px;
      padding: 4px 0;
      line-height: 1
    }

    .seen-row {
      display: flex;
      justify-content: flex-end;
      gap: 4px;
      align-items: center;
      margin-top: 2px
    }

    .seen-text {
      font-size: 11px;
      color: var(--gray)
    }

    /* INPUT */
    .chat-input-area {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px
    }

    .msg-input-wrap {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      transition: border-color .15s
    }

    .msg-input-wrap:focus-within {
      border-color: #aaa
    }

    .msg-input {
      flex: 1;
      border: none;
      outline: none;
      background: none;
      font-size: 14px;
      color: var(--dark);
      resize: none;
      max-height: 120px;
      line-height: 1.4
    }

    .msg-input::placeholder {
      color: var(--gray)
    }

    .emoji-btn {
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform .15s;
      user-select: none
    }

    .emoji-btn:hover {
      transform: scale(1.2)
    }

    .send-btn {
      color: var(--blue);
      font-size: 14px;
      font-weight: 700;
      transition: opacity .15s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .send-btn:hover {
      opacity: .7
    }

    .send-btn svg {
      width: 24px;
      height: 24px
    }

    /* EMPTY */
    .empty-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--gray)
    }

    .empty-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid var(--dark);
      display: flex;
      align-items: center;
      justify-content: center
    }

    .empty-icon svg {
      width: 40px;
      height: 40px;
      stroke: var(--dark)
    }

    .empty-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark)
    }

    .empty-sub {
      font-size: 14px;
      color: var(--gray);
      text-align: center;
      max-width: 240px;
      line-height: 1.5
    }

    /* NEW MSG MODAL */
    .nm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      z-index: 500;
      align-items: center;
      justify-content: center
    }

    .nm-overlay.open {
      display: flex
    }

    .nm-box {
      background: #fff;
      border-radius: 12px;
      width: 400px;
      max-width: 90vw;
      overflow: hidden
    }

    .nm-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border)
    }

    .nm-title {
      font-size: 16px;
      font-weight: 800
    }

    .nm-close {
      font-size: 20px;
      cursor: pointer;
      color: var(--gray)
    }

    .nm-search {
      padding: 10px 16px;
      border-bottom: 1px solid #efefef
    }

    .nm-sinput {
      width: 100%;
      border: none;
      outline: none;
      font-size: 14px;
      color: var(--dark);
      background: none
    }

    .nm-sinput::placeholder {
      color: var(--gray)
    }

    .nm-list {
      max-height: 300px;
      overflow-y: auto
    }

    .nm-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background .12s
    }

    .nm-item:hover {
      background: #fafafa
    }

    .nm-av {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border: 1px solid #efefef;
      overflow: hidden;
      background: linear-gradient(135deg, #a8edea, #fed6e3);
      flex-shrink: 0
    }

    .nm-av img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .nm-info {
      flex: 1
    }

    .nm-un {
      font-size: 14px;
      font-weight: 700;
      display: block
    }

    .nm-name {
      font-size: 13px;
      color: var(--gray)
    }

    @media(max-width:768px) {
      .inbox {
        width: 100%
      }

      .chat {
        display: none
      }

      nav .nsearch {
        display: none
      }
    }
  </style>
</head>

<body>
  {% csrf_token %}

  <!-- ── NAV ── -->
  <nav>
    <a href="{% url 'home' %}" class="logo" data-pjax>Instagram</a>
    <div class="nicons">
      <a href="{% url 'home' %}" class="nibtn" title="Home" data-pjax>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z" />
          <path d="M9 21V12h6v9" />
        </svg>
      </a>
      <a href="{% url 'messages' %}" class="nibtn" title="Messages" style="color:var(--dark)">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        </svg>
      </a>
      <a href="{% url 'profile' request.user.username %}" class="navat" title="Profile" data-pjax>
        {% if request.user.profile and request.user.profile.profile_image %}
        <img src="{{ request.user.profile.profile_image.url }}" alt="{{ request.user.username }}">
        {% else %}
        <div class="navat-placeholder"></div>
        {% endif %}
      </a>
    </div>
  </nav>

  <!-- ── SHELL ── -->
  <div class="shell">

    <!-- LEFT: Inbox -->
    <div class="inbox">
      <div class="inbox-header">
        <span class="inbox-title">{{ request.user.username }}</span>
        <button class="icon-btn" onclick="openNewMsg()" title="New message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 20h9" />
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
          </svg>
        </button>
      </div>
      <div class="inbox-tabs">
        <button class="tab-btn active" onclick="setTab(this)">Messages</button>
        <button class="tab-btn" onclick="setTab(this)">Requests</button>
      </div>
      <div class="inbox-search">
        <div class="isearch">
          <svg viewBox="0 0 24 24" fill="none" stroke="#8e8e8e" stroke-width="2" width="14" height="14">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="convoSearch" placeholder="Search" oninput="filterConvos()">
        </div>
      </div>
      <div class="convo-list" id="convoList">
        <div style="text-align:center;padding:30px 20px;color:var(--gray);font-size:13px">Loading…</div>
      </div>
    </div>

    <!-- RIGHT: Chat panel -->
    <div class="chat" id="chatPanel">
      <div class="empty-chat">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
        </div>
        <div class="empty-title">Your messages</div>
        <div class="empty-sub">Send private messages to friends.</div>
        <button class="send-btn"
          style="background:var(--blue);color:#fff;padding:8px 20px;border-radius:8px;font-weight:700;font-size:14px"
          onclick="openNewMsg()">Send message</button>
      </div>
    </div>

  </div>

  <!-- ── NEW MESSAGE MODAL ── -->
  <div class="nm-overlay" id="nmOverlay" onclick="if(event.target===this)closeNewMsg()">
    <div class="nm-box">
      <div class="nm-head">
        <span class="nm-title">New message</span>
        <span class="nm-close" onclick="closeNewMsg()">✕</span>
      </div>
      <div class="nm-search">
        <input class="nm-sinput" id="nmSearch" type="text" placeholder="Search people…" oninput="searchPeople()">
      </div>
      <div class="nm-list" id="nmList">
        <div style="text-align:center;padding:20px;color:var(--gray);font-size:13px">Type a username to search</div>
      </div>
    </div>
  </div>

  <script>
    /* ── Config ── */
    const ME = "{{ request.user.username }}";
    const CSRF = document.querySelector('[name=csrfmiddlewaretoken]').value;
    let activeUser = null;
    let pollTimer = null;
    let allConvos = [];

    /* ── Avatar helper ── */
    function avHTML(avatarUrl, size) {
      var s = size || 56;
      if (avatarUrl) {
        return `<img src="${avatarUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
      }
      return `<span style="font-size:${Math.round(s * 0.46)}px">🧑</span>`;
    }

    /* ── Load conversations from API ── */
    function loadConversations() {
      fetch('/messages/conversations/', { credentials: 'same-origin' })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          allConvos = data.conversations || [];
          renderConvoList(allConvos);
        })
        .catch(function () { /* silently fail */ });
    }

    function renderConvoList(convos) {
      var list = document.getElementById('convoList');
      if (!convos.length) {
        list.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--gray);font-size:13px">No conversations yet.<br>Send a message to start chatting!</div>';
        return;
      }
      list.innerHTML = convos.map(function (c) {
        var active = activeUser === c.username ? 'active' : '';
        return `<div class="convo-item ${active}" onclick="openChat('${c.username}')">
      <div class="convo-av">
        <div class="convo-av-img">${avHTML(c.avatar_url, 56)}</div>
      </div>
      <div class="convo-body">
        <div class="convo-row">
          <span class="convo-name">${esc(c.full_name)}</span>
          <span class="convo-time">${esc(c.time)}</span>
        </div>
        <div class="convo-row">
          <span class="convo-preview ${c.unread ? 'bold' : ''}">${esc(c.preview)}</span>
          ${c.unread ? '<div class="unread-badge"></div>' : ''}
        </div>
      </div>
    </div>`;
      }).join('');
    }

    function filterConvos() {
      var q = document.getElementById('convoSearch').value.toLowerCase().trim();
      if (!q) { renderConvoList(allConvos); return; }
      renderConvoList(allConvos.filter(function (c) {
        return c.username.toLowerCase().includes(q) || c.full_name.toLowerCase().includes(q);
      }));
    }

    /* ── Open a chat ── */
    function openChat(username) {
      activeUser = username;
      if (pollTimer) clearInterval(pollTimer);

      // Mark active in sidebar
      renderConvoList(allConvos);

      // Load messages
      fetchMessages(username, true);

      // Poll every 4 seconds for new messages
      pollTimer = setInterval(function () { fetchMessages(username, false); }, 4000);
    }

    function fetchMessages(username, firstLoad) {
      fetch('/messages/with/' + username + '/', { credentials: 'same-origin' })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (firstLoad) buildChatUI(data.other, data.messages);
          else updateMessages(data.messages);
          // Refresh sidebar to clear unread badges
          if (firstLoad) loadConversations();
        });
    }

    /* ── Build full chat UI ── */
    function buildChatUI(other, msgs) {
      var panel = document.getElementById('chatPanel');
      panel.innerHTML = `
    <div class="chat-header">
      <div class="chat-av" onclick="window.location='/profile/${other.username}/'">
        ${avHTML(other.avatar_url, 38)}
      </div>
      <div class="chat-user-info" onclick="window.location='/profile/${other.username}/'">
        <div class="chat-username">${esc(other.full_name)}</div>
        <div class="chat-status">@${esc(other.username)}</div>
      </div>
      <div class="chat-header-actions">
        <button class="chat-hbtn" title="Voice call"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></button>
        <button class="chat-hbtn" title="Video call"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></button>
      </div>
    </div>
    <div class="messages-area" id="msgArea"></div>
    <div class="chat-input-area">
      <div class="msg-input-wrap">
        <textarea class="msg-input" id="msgInput" placeholder="Message ${esc(other.full_name)}…" rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <span class="emoji-btn" onclick="insertEmoji()">😊</span>
      </div>
      <button class="send-btn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0095f6" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="#0095f6" stroke="none"/></svg>
      </button>
    </div>`;

      renderMessages(msgs, other);
      scrollBottom();
    }

    /* ── Render messages into #msgArea ── */
    var _lastMsgCount = 0;
    function renderMessages(msgs, other) {
      if (!msgs || msgs.length === _lastMsgCount) return;
      _lastMsgCount = msgs.length;
      var area = document.getElementById('msgArea');
      if (!area) return;

      area.innerHTML = '<div class="msg-date-sep">Today</div>' +
        msgs.map(function (m) {
          var isEmoji = /^\p{Emoji}+$/u.test(m.text) && m.text.length <= 4;
          if (m.out) {
            return `<div class="msg-row out">
          <div class="bubble ${isEmoji ? 'emoji-only' : ''}">${esc(m.text)}</div>
        </div>`;
          } else {
            return `<div class="msg-row in">
          <div class="msg-av">${avHTML(other ? other.avatar_url : null, 28)}</div>
          <div class="bubble ${isEmoji ? 'emoji-only' : ''}">${esc(m.text)}</div>
        </div>`;
          }
        }).join('');

      // Seen indicator for last outgoing message
      if (msgs.length) {
        var last = msgs[msgs.length - 1];
        if (last.out) {
          area.innerHTML += `<div class="seen-row"><span class="seen-text">${last.is_read ? 'Seen' : 'Delivered'}</span></div>`;
        }
      }

      scrollBottom();
    }

    function updateMessages(msgs) {
      var area = document.getElementById('msgArea');
      if (!area || !activeUser) return;
      // Get "other" info from panel header
      var other = null;
      renderMessages(msgs, other);
    }

    /* ── Send message ── */
    function sendMessage() {
      var input = document.getElementById('msgInput');
      if (!input || !activeUser) return;
      var text = input.value.trim();
      if (!text) return;

      input.value = '';
      input.style.height = 'auto';

      fetch('/messages/send/' + activeUser + '/', {
        method: 'POST',
        credentials: 'same-origin',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': CSRF
        },
        body: JSON.stringify({ text: text })
      })
        .then(function (r) { return r.json(); })
        .then(function (msg) {
          // Append new message immediately
          var area = document.getElementById('msgArea');
          if (!area) return;
          var seen = area.querySelector('.seen-row');
          if (seen) seen.remove();

          var isEmoji = /^\p{Emoji}+$/u.test(msg.text) && msg.text.length <= 4;
          var row = document.createElement('div');
          row.className = 'msg-row out';
          row.innerHTML = `<div class="bubble ${isEmoji ? 'emoji-only' : ''}">${esc(msg.text)}</div>`;
          area.appendChild(row);

          var seenDiv = document.createElement('div');
          seenDiv.className = 'seen-row';
          seenDiv.innerHTML = '<span class="seen-text">Delivered</span>';
          area.appendChild(seenDiv);

          _lastMsgCount++;
          scrollBottom();
          loadConversations();
        })
        .catch(function () { /* silently fail */ });
    }

    /* ── New message modal ── */
    var nmSearchTimer = null;
    function openNewMsg() {
      document.getElementById('nmOverlay').classList.add('open');
      document.getElementById('nmSearch').value = '';
      document.getElementById('nmList').innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray);font-size:13px">Type a username to search</div>';
      setTimeout(function () { document.getElementById('nmSearch').focus(); }, 100);
    }
    function closeNewMsg() {
      document.getElementById('nmOverlay').classList.remove('open');
    }
    function searchPeople() {
      var q = document.getElementById('nmSearch').value.trim();
      if (!q) { document.getElementById('nmList').innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray);font-size:13px">Type a username to search</div>'; return; }
      if (nmSearchTimer) clearTimeout(nmSearchTimer);
      nmSearchTimer = setTimeout(function () {
        fetch('/search/?q=' + encodeURIComponent(q) + '&json=1', { credentials: 'same-origin' })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            var users = data.users || [];
            var list = document.getElementById('nmList');
            if (!users.length) {
              list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray);font-size:13px">No users found</div>';
              return;
            }
            list.innerHTML = users.map(function (u) {
              return `<div class="nm-item" onclick="startChat('${u.username}')">
            <div class="nm-av">${avHTML(u.avatar_url, 42)}</div>
            <div class="nm-info">
              <span class="nm-un">${esc(u.username)}</span>
              <span class="nm-name">${esc(u.full_name || u.username)}</span>
            </div>
          </div>`;
            }).join('');
          })
          .catch(function () {
            document.getElementById('nmList').innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray);font-size:13px">Search error</div>';
          });
      }, 300);
    }
    function startChat(username) {
      closeNewMsg();
      // Add to conversations if not there
      var exists = allConvos.find(function (c) { return c.username === username; });
      if (!exists) {
        allConvos.unshift({ username: username, full_name: username, avatar_url: null, preview: '', time: '', unread: false });
        renderConvoList(allConvos);
      }
      openChat(username);
    }

    /* ── Helpers ── */
    function scrollBottom() { var a = document.getElementById('msgArea'); if (a) a.scrollTop = a.scrollHeight; }
    function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
    function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
    function insertEmoji() { var i = document.getElementById('msgInput'); if (!i) return; var e = ['😊', '❤️', '🔥', '😂', '🎉', '👏', '🙌', '💯', '✨', '😍']; i.value += e[Math.floor(Math.random() * e.length)]; i.focus(); }
    function setTab(btn) { document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); }); btn.classList.add('active'); }
    function esc(t) { if (!t) return ''; return String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    /* ── Init ── */
    loadConversations();

    // Auto-open chat if URL has ?with=<username>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var withUser = params.get('with');
      if (withUser) openChat(withUser);
    })();
  </script>

  <!-- PJAX -->
  <script>
    (function () {
      function makeBar() {
        var b = document.getElementById('pjax-bar');
        if (!b) { b = document.createElement('div'); b.id = 'pjax-bar'; b.style.cssText = 'position:fixed;top:0;left:0;height:2px;width:0;background:linear-gradient(90deg,#0095f6,#c13584);z-index:99999;transition:width .3s ease,opacity .3s ease;border-radius:0 2px 2px 0;pointer-events:none'; document.body.appendChild(b); }
        return b;
      }
      function showBar() { var b = makeBar(); b.style.opacity = '1'; b.style.width = '65%'; }
      function doneBar() { var b = makeBar(); b.style.width = '100%'; setTimeout(function () { b.style.opacity = '0'; setTimeout(function () { b.style.width = '0'; }, 300); }, 200); }
      window._pjaxLoading = false;
      window.pjaxLoad = function (url) {
        if (window._pjaxLoading || url === window.location.href) return;
        window._pjaxLoading = true; showBar();
        document.body.style.opacity = '0.85'; document.body.style.transition = 'opacity 0.15s';
        fetch(url, { credentials: 'same-origin' })
          .then(function (r) { return r.text(); })
          .then(function (html) {
            var parser = new DOMParser(); var doc = parser.parseFromString(html, 'text/html');
            var existingStyles = Array.from(document.head.querySelectorAll('style')).map(function (s) { return s.textContent.trim(); });
            doc.head.querySelectorAll('style').forEach(function (ns) { var txt = ns.textContent.trim(); if (!existingStyles.includes(txt)) { var c = document.createElement('style'); c.textContent = txt; document.head.appendChild(c); } });
            document.body.innerHTML = doc.body.innerHTML; document.title = doc.title;
            history.pushState({ pjax: url }, doc.title, url);
            document.body.querySelectorAll('script').forEach(function (old) { if (old.src) return; var s = document.createElement('script'); s.textContent = old.textContent; document.head.appendChild(s); });
            doneBar(); document.body.style.opacity = '1'; window.scrollTo(0, 0); window._pjaxLoading = false; attachPjax();
          }).catch(function () { window._pjaxLoading = false; window.location.href = url; });
      };
      function attachPjax() { document.removeEventListener('click', handlePjaxClick); document.addEventListener('click', handlePjaxClick); }
      function handlePjaxClick(e) { var a = e.target.closest('[data-pjax]'); if (!a || !a.href) return; try { var u = new URL(a.href); if (u.origin !== window.location.origin) return; } catch (ex) { return; } e.preventDefault(); window.pjaxLoad(a.href); }
      window.addEventListener('popstate', function () { window.pjaxLoad(window.location.href); });
      attachPjax();
    })();
  </script>
</body>
